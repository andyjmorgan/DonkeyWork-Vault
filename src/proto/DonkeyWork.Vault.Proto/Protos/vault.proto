syntax = "proto3";

package donkeywork.vault.v1;
option csharp_namespace = "DonkeyWork.Vault.Proto.V1";
option go_package = "donkeywork.dev/vault-cli/internal/vaultpb";

// All RPCs carry x-user-id (and optional x-tenant-id) gRPC metadata set by the caller.
// The vault returns UNAUTHENTICATED if x-user-id is missing.

// ---------- shared ----------
message ApiKeyField {
  string name = 1;
  string label = 2;
  bool secret = 3;
  bool required = 4;
}

message ApiKeyProvider {
  string key = 1;            // manifest id, e.g. "grafana"
  string name = 2;
  string icon_url = 3;
  string docs_url = 4;
  string auth_scheme = 5;    // header | basic
  string header = 6;         // e.g. Authorization, x-api-key
  string prefix = 7;         // e.g. "Bearer "
  map<string, string> static_headers = 8;
  string base_url = 9;
  repeated ApiKeyField fields = 10;
}

// How a stored credential is presented on the wire (for the CLI `shape` command).
message CredentialShape {
  string base_url = 1;
  string header = 2;
  string prefix = 3;
  map<string, string> static_headers = 4;
}

// ---------- credential store (hot path) ----------
service CredentialStore {
  rpc GetApiKey(GetApiKeyRequest) returns (GetApiKeyResponse);
  rpc DescribeCredential(DescribeCredentialRequest) returns (DescribeCredentialResponse);
  rpc GetOAuthAccessToken(GetOAuthAccessTokenRequest) returns (GetOAuthAccessTokenResponse);
}

message GetOAuthAccessTokenRequest {
  string provider = 1;
  string account = 2;        // optional
}
message GetOAuthAccessTokenResponse {
  bool found = 1;
  string access_token = 2;
  string expires_at = 3;     // ISO 8601 or empty
  repeated string scopes = 4;
}

// ---------- oauth token management ----------
service OAuthTokens {
  rpc List(ListOAuthTokensRequest) returns (ListOAuthTokensResponse);
}
message ListOAuthTokensRequest {}
message OAuthTokenSummary {
  string id = 1;
  string provider = 2;
  string account = 3;
  string expires_at = 4;
  string last_refreshed_at = 5;
  repeated string scopes = 6;
}
message ListOAuthTokensResponse { repeated OAuthTokenSummary items = 1; }

message GetApiKeyRequest { string name = 1; }
message GetApiKeyResponse {
  bool found = 1;
  string secret = 2;
  string header = 3;
  string prefix = 4;
  string base_url = 5;
  string docs_url = 6;
  string description = 7;
}

message DescribeCredentialRequest { string name = 1; }
message DescribeCredentialResponse {
  bool found = 1;
  string header = 2;
  string prefix = 3;
  string base_url = 4;
  string docs_url = 5;
  string description = 6;
}

// ---------- api key management (brokered by the Portal) ----------
service ApiKeys {
  rpc List(ListApiKeysRequest) returns (ListApiKeysResponse);
  rpc Create(CreateApiKeyRequest) returns (ApiKeyItem);
  rpc Delete(DeleteApiKeyRequest) returns (DeleteApiKeyResponse);
}

message ApiKeyItem {
  string id = 1;
  string name = 2;
  string description = 3;
  string base_url = 4;
  string docs_url = 5;
  string header = 6;
  string prefix = 7;
  string created_at = 8;
  string last_used_at = 9;
}
message ListApiKeysRequest {}
message ListApiKeysResponse { repeated ApiKeyItem items = 1; }

message CreateApiKeyRequest {
  string name = 1;
  string secret = 2;
  string description = 3;
  string base_url = 4;
  string docs_url = 5;
  string header = 6;
  string prefix = 7;
}

message DeleteApiKeyRequest { string id = 1; }
message DeleteApiKeyResponse { bool deleted = 1; }

// ---------- api key provider catalog ----------
service ApiKeyCatalog {
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  rpc GetProvider(GetProviderRequest) returns (ApiKeyProvider);
}

message ListProvidersRequest {}
message ListProvidersResponse { repeated ApiKeyProvider providers = 1; }
message GetProviderRequest { string key = 1; }

// ---------- provider manifest management (admin/runtime catalog) ----------
message Empty {}

message OAuthScopeMsg {
  string value = 1;
  string description = 2;
  string category = 3;
  bool sensitive = 4;
}
message OAuthManifestMsg {
  string key = 1;
  string name = 2;
  string authorization_endpoint = 3;
  string token_endpoint = 4;
  string userinfo_endpoint = 5;
  string scope_delimiter = 6;
  repeated string default_scopes = 7;
  string icon_url = 8;
  string docs_url = 9;
  bool builtin = 10;          // seeded built-in (read-only in the UI)
  repeated OAuthScopeMsg scopes = 11;
}
message ListApiKeyManifestsResponse { repeated ApiKeyProvider items = 1; }
message ListOAuthManifestsResponse { repeated OAuthManifestMsg items = 1; }
message DeleteManifestRequest { string kind = 1; string key = 2; }
message DeleteResponse { bool deleted = 1; }
message DiscoverOidcRequest { string url = 1; }

service Manifests {
  rpc ListApiKey(Empty) returns (ListApiKeyManifestsResponse);
  rpc UpsertApiKey(ApiKeyProvider) returns (ApiKeyProvider);
  rpc ListOAuth(Empty) returns (ListOAuthManifestsResponse);
  rpc UpsertOAuth(OAuthManifestMsg) returns (OAuthManifestMsg);
  rpc Delete(DeleteManifestRequest) returns (DeleteResponse);
  rpc DiscoverOidc(DiscoverOidcRequest) returns (OAuthManifestMsg);
}

// ---------- oauth provider app configs ----------
message OAuthConfigItem {
  string id = 1;
  string provider = 2;
  string client_id_masked = 3;
  repeated string scopes = 4;
  string redirect_uri = 5;
  string created_at = 6;
}
message ListOAuthConfigsResponse { repeated OAuthConfigItem items = 1; }
message UpsertOAuthConfigRequest {
  string provider = 1;
  string client_id = 2;
  string client_secret = 3;   // optional on update
  repeated string scopes = 4;
  string redirect_uri = 5;
}
message DeleteByIdRequest { string id = 1; }

service OAuthProviderConfigs {
  rpc List(Empty) returns (ListOAuthConfigsResponse);
  rpc Upsert(UpsertOAuthConfigRequest) returns (OAuthConfigItem);
  rpc Delete(DeleteByIdRequest) returns (DeleteResponse);
}

// ---------- access keys (scoped auth credentials for the CLI/agents + portal) ----------
// An access key authenticates a caller to the vault (x-api-key metadata) and/or the portal
// (Authorization: Bearer / X-Api-Key). It carries scopes (frontend:read|readwrite,
// vault:read|readwrite) and can be enabled/disabled. The secret is shown ONCE on create;
// only a sha256 hash + display prefix are stored.
service AccessKeys {
  rpc List(Empty) returns (ListAccessKeysResponse);
  rpc Create(CreateAccessKeyRequest) returns (CreateAccessKeyResponse);   // secret returned ONCE
  rpc SetEnabled(SetAccessKeyEnabledRequest) returns (AccessKeyItem);
  rpc Delete(DeleteByIdRequest) returns (DeleteResponse);
  rpc Authenticate(AuthenticateApiKeyRequest) returns (AuthenticateApiKeyResponse); // brokered by the portal
}

message AccessKeyItem {
  string id = 1;
  string name = 2;
  string description = 3;
  repeated string scopes = 4;
  bool enabled = 5;
  string prefix = 6;           // display-only, e.g. "dwv_AbC12"
  string created_at = 7;
  string last_used_at = 8;
}
message ListAccessKeysResponse { repeated AccessKeyItem items = 1; }
message CreateAccessKeyRequest { string name = 1; string description = 2; repeated string scopes = 3; }
message CreateAccessKeyResponse { AccessKeyItem item = 1; string secret = 2; } // secret shown once
message SetAccessKeyEnabledRequest { string id = 1; bool enabled = 2; }
message AuthenticateApiKeyRequest { string secret = 1; }
message AuthenticateApiKeyResponse {
  bool valid = 1;
  string user_id = 2;
  string tenant_id = 3;
  repeated string scopes = 4;
  string name = 5;
}

// ---------- oauth connect flow (browser redirect) ----------
message BeginAuthRequest { string provider = 1; repeated string scopes = 2; string public_base_url = 3; }
message BeginAuthResponse { string authorize_url = 1; string state = 2; }
message CompleteAuthRequest { string provider = 1; string code = 2; string state = 3; }
message CompleteAuthResponse { string provider = 1; string account = 2; repeated string scopes = 3; string expires_at = 4; }

service OAuthFlow {
  rpc Begin(BeginAuthRequest) returns (BeginAuthResponse);
  rpc Complete(CompleteAuthRequest) returns (CompleteAuthResponse);
}
