<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DonkeyWork Vault documentation for the web app, CLI, OAuth providers, self-hosting, API access, and security."
    />
    <title>DonkeyWork Vault Docs</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <style>
      :root {
        --theme-color: #2563eb;
      }

      body {
        letter-spacing: 0;
      }

      .app-name-link {
        font-weight: 700;
      }

      .sidebar-nav > ul > li > a {
        font-weight: 600;
      }

      .markdown-section {
        max-width: 920px;
      }

      .markdown-section table {
        display: table;
        width: 100%;
      }

      .markdown-section code {
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="app">Loading documentation...</div>
    <script>
      window.$docsify = {
        name: 'DonkeyWork Vault',
        repo: 'andyjmorgan/DonkeyWork-Vault',
        loadSidebar: true,
        subMaxLevel: 2,
        auto2top: true,
        relativePath: true,
        search: {
          paths: 'auto',
          placeholder: 'Search docs',
          noData: 'No results',
        },
      }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  </body>
</html>
