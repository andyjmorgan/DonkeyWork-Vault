name: cli-autorelease

# Mint a new dwvault CLI version on every change under src/cli/. Computes the next
# patch from the latest vX.Y.Z tag, cross-compiles, and publishes a GitHub release
# with the per-arch binaries. For an explicit minor/major bump, push a vX.Y.Z tag
# manually (handled by release-cli.yml); this job patch-bumps from whatever exists.
on:
  push:
    branches: [main]
    paths: ['src/cli/**']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: cli-autorelease
  cancel-in-progress: false

jobs:
  release:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the full tag history to compute the next version

      - name: Compute next patch version
        id: ver
        run: |
          git fetch --tags --force
          # Strict semver (no leading zeroes) so the patch bump can't hit bash octal.
          latest=$(git tag -l 'v*' | grep -E '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' | sort -V | tail -n1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            v=${latest#v}; IFS=. read -r MA MI PA <<<"$v"
            next="v${MA}.${MI}.$((10#$PA + 1))"
          fi
          if git rev-parse -q --verify "refs/tags/$next" >/dev/null; then
            echo "::error::tag $next already exists; aborting"; exit 1
          fi
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Next dwvault version: $next (from ${latest:-<none>})"

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/cli/go.mod
          cache-dependency-path: src/cli/go.sum

      - name: Test + coverage gate (cli, ≥95%)
        # Don't publish a release if the CLI tests fail or coverage of hand-written code
        # regresses below the threshold. No Postgres needed for the CLI module.
        run: bash scripts/coverage.sh cli

      - name: Build dwvault (multi-arch)
        working-directory: src/cli
        env:
          VERSION: ${{ steps.ver.outputs.next }} # via env (not inline) per GH best practice
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          for t in linux/amd64 linux/arm64 darwin/arm64 darwin/amd64; do
            os="${t%/*}"; arch="${t#*/}"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -ldflags "-s -w -X main.version=${VERSION}" \
              -o "$GITHUB_WORKSPACE/dist/dwvault-$os-$arch" .
          done

      - name: Sign & notarize macOS binaries
        uses: ./.github/actions/sign-macos
        with:
          dist-dir: dist
          p12-base64:   ${{ secrets.MACOS_DEVID_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_DEVID_P12_PASSWORD }}
          notary-p8:    ${{ secrets.MACOS_NOTARY_P8 }}
          issuer-id: 69a6de86-6cb1-47e3-e053-5b8c7c11a4d1
          key-id: 84826SWSQ2

      - name: Checksums
        run: ( cd "$GITHUB_WORKSPACE/dist" && sha256sum dwvault-* > SHA256SUMS )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.next }}
          name: ${{ steps.ver.outputs.next }}
          target_commitish: ${{ github.sha }} # bind the tag to the built commit
          files: |
            dist/dwvault-*
            dist/SHA256SUMS
          generate_release_notes: true
