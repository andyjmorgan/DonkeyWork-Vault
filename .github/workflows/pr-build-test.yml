name: PR Build & Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (Go backend)
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: src/server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/server/go.mod
          cache-dependency-path: src/server/go.sum

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "::error::gofmt needed on: $out"; exit 1; fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Start ephemeral Postgres
        run: |
          docker rm -f vault-ci-pg 2>/dev/null || true
          docker run -d --name vault-ci-pg \
            -e POSTGRES_USER=vault -e POSTGRES_PASSWORD=vault -e POSTGRES_DB=vault_test \
            -p 127.0.0.1:55433:5432 postgres:17-alpine
          for i in $(seq 1 30); do
            docker exec vault-ci-pg pg_isready -U vault && break
            sleep 1
          done

      - name: Test (unit + Postgres integration)
        env:
          VAULT_TEST_DSN: postgres://vault:vault@127.0.0.1:55433/vault_test?sslmode=disable
        run: go test ./...

      - name: Stop ephemeral Postgres
        if: always()
        run: docker rm -f vault-ci-pg 2>/dev/null || true
