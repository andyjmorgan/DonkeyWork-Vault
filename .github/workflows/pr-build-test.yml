name: PR Build & Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, Test & Coverage (Go)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/server/go.mod
          cache-dependency-path: |
            src/server/go.sum
            src/cli/go.sum

      - name: gofmt
        run: |
          out=$(gofmt -l src/server src/cli)
          if [ -n "$out" ]; then echo "::error::gofmt needed on: $out"; exit 1; fi

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Lint (server)
        working-directory: src/server
        run: "$(go env GOPATH)/bin/golangci-lint run ./..."

      - name: Lint (cli)
        working-directory: src/cli
        run: "$(go env GOPATH)/bin/golangci-lint run ./..."

      - name: Build (server)
        working-directory: src/server
        run: go build ./...

      - name: Vet (server)
        working-directory: src/server
        run: go vet ./...

      - name: Build (cli)
        working-directory: src/cli
        run: go build ./...

      - name: Vet (cli)
        working-directory: src/cli
        run: go vet ./...

      - name: Start ephemeral Postgres
        run: |
          # Unique name + an OS-assigned host port so concurrent runs on a shared self-hosted
          # runner don't collide.
          NAME="vault-ci-pg-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "PG_NAME=$NAME" >> "$GITHUB_ENV"
          docker rm -f "$NAME" 2>/dev/null || true
          docker run -d --name "$NAME" \
            -e POSTGRES_USER=vault -e POSTGRES_PASSWORD=vault -e POSTGRES_DB=vault_test \
            -p 127.0.0.1:0:5432 postgres:17-alpine
          for i in $(seq 1 30); do
            docker exec "$NAME" pg_isready -U vault && break
            sleep 1
          done
          PORT=$(docker port "$NAME" 5432/tcp | head -1 | sed 's/.*://')
          echo "VAULT_TEST_DSN=postgres://vault:vault@127.0.0.1:${PORT}/vault_test?sslmode=disable" >> "$GITHUB_ENV"

      - name: Test + coverage gate (server + cli, ≥95%)
        # Runs the full unit + Postgres-integration suite for both modules and fails if
        # coverage of hand-written code drops below the threshold. Reuses the Postgres above
        # via VAULT_TEST_DSN. See scripts/coverage.sh for the denominator (generated clients
        # and main() entrypoints are excluded; //coverage:ignore drops unreachable branches).
        run: bash scripts/coverage.sh all

      - name: Stop ephemeral Postgres
        if: always()
        run: docker rm -f "$PG_NAME" 2>/dev/null || true
