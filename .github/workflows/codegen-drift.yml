name: Codegen Drift

# The .NET endpoints are the authoritative contract. This gate re-emits api/openapi.json from the
# running service and regenerates the Go + TS clients, failing if any committed artifact is stale —
# so an endpoint change can never land without its regenerated clients.
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/vault/**'
      - 'api/**'
      - 'src/cli/internal/vaultapi/**'
      - 'src/portal/frontend/src/api/**'
      - 'scripts/emit-openapi.sh'
      - 'scripts/gen-clients.sh'
      - '.github/workflows/codegen-drift.yml'

permissions:
  contents: read

concurrency:
  group: codegen-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: OpenAPI + clients in sync
    runs-on: [self-hosted, Linux, X64]
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/cli/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure NuGet for local proxy
        run: cp _nuget.config nuget.config

      - name: Build vault
        run: dotnet build src/vault/DonkeyWork.Vault.Api/DonkeyWork.Vault.Api.csproj -c Release

      - name: Emit OpenAPI document
        run: ./scripts/emit-openapi.sh

      - name: Regenerate Go + TS clients
        run: ./scripts/gen-clients.sh

      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- \
            api/openapi.json \
            src/cli/internal/vaultapi/vaultapi.gen.go \
            src/portal/frontend/src/api/schema.d.ts; then
            echo "::error::OpenAPI / generated clients are stale. Run scripts/emit-openapi.sh && scripts/gen-clients.sh and commit the result."
            exit 1
          fi
