name: Codegen Drift

# api/openapi.json is the hand-maintained, authoritative wire contract (the Go server's contract
# test pins its route table to it). This gate
# regenerates the Go + TS clients from the committed document and fails if any generated artifact
# is stale — so a contract change can never land without its regenerated clients.
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/server/**'
      - 'api/**'
      - 'src/cli/internal/vaultapi/**'
      - 'src/portal/frontend/src/api/**'
      - 'scripts/gen-clients.sh'
      - '.github/workflows/codegen-drift.yml'

permissions:
  contents: read

concurrency:
  group: codegen-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: OpenAPI + clients in sync
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/cli/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Regenerate Go + TS clients
        run: ./scripts/gen-clients.sh

      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- \
            api/openapi.json \
            src/cli/internal/vaultapi/vaultapi.gen.go \
            src/portal/frontend/src/api/schema.d.ts; then
            echo "::error::Generated clients are stale. Run scripts/gen-clients.sh and commit the result."
            exit 1
          fi
