name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ${{ vars.DOCKER_REGISTRY }}
  VAULT_IMAGE: donkeywork-vault/vault

jobs:
  test-backend:
    name: Test Backend (Go)
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: src/server
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/server/go.mod
          cache-dependency-path: src/server/go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Start ephemeral Postgres
        run: |
          NAME="vault-ci-pg-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "PG_NAME=$NAME" >> "$GITHUB_ENV"
          docker rm -f "$NAME" 2>/dev/null || true
          docker run -d --name "$NAME" \
            -e POSTGRES_USER=vault -e POSTGRES_PASSWORD=vault -e POSTGRES_DB=vault_test \
            -p 127.0.0.1:0:5432 postgres:17-alpine
          for i in $(seq 1 30); do
            docker exec "$NAME" pg_isready -U vault && break
            sleep 1
          done
          PORT=$(docker port "$NAME" 5432/tcp | head -1 | sed 's/.*://')
          echo "VAULT_TEST_DSN=postgres://vault:vault@127.0.0.1:${PORT}/vault_test?sslmode=disable" >> "$GITHUB_ENV"
      - name: Test (unit + Postgres integration)
        run: go test ./...
      - name: Stop ephemeral Postgres
        if: always()
        run: docker rm -f "$PG_NAME" 2>/dev/null || true

  build-vault:
    name: Build & Push Vault Image
    needs: [test-backend]
    if: needs.test-backend.result == 'success'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - name: Login to Nexus
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.VAULT_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=
      - name: Build & push vault image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.vault
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            VAULT_VERSION=${{ github.sha }}
