name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ${{ vars.DOCKER_REGISTRY }}
  VAULT_IMAGE: donkeywork-vault/vault

jobs:
  test-backend:
    name: Test Backend
    runs-on: [self-hosted, Linux, X64]
    env:
      DOTNET_INSTALL_DIR: ${{ github.workspace }}/.dotnet
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Configure NuGet for local proxy
        run: cp _nuget.config nuget.config
      - name: Restore
        run: dotnet restore DonkeyWork.Vault.slnx
      - name: Build
        run: dotnet build DonkeyWork.Vault.slnx -c Release --no-restore
      - name: Test (unit tier)
        run: dotnet test DonkeyWork.Vault.slnx -c Release --no-build --filter "Category!=Integration"

  build-vault:
    name: Build & Push Vault Image
    needs: [test-backend]
    if: needs.test-backend.result == 'success'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - name: Login to Nexus
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.VAULT_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=
      - name: Build & push vault image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.vault
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
